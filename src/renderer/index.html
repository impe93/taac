<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Taac</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- blob: in script-src/worker-src is required by the realtime-transcription
         AudioWorklet, loaded from a Blob URL (see lib/pcmTapStreamer.ts) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
