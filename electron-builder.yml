appId: com.taacnotes.app
productName: Taac
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # octokit is used by node-llama-cpp only for GitHub release resolution (never
  # called in our app). A pnpm patch converts the static import to dynamic,
  # allowing safe exclusion. Including octokit doesn't work either because
  # universal-github-app-jwt uses #crypto subpath imports incompatible with asar.
  - '!node_modules/octokit/**'
  - '!node_modules/@octokit/**'
  - '!node_modules/universal-github-app-jwt/**'
asarUnpack:
  - resources/**
  - node_modules/sqlite-vec/**
  - node_modules/sqlite-vec-*/**
  - node_modules/better-sqlite3/**
  - node_modules/node-llama-cpp/**
  - node_modules/@node-llama-cpp/**
  - node_modules/ffmpeg-static/**
  - node_modules/sherpa-onnx/**
  - '**/*.node'
  - '**/*.dylib'
  - '**/*.so'
  - '**/*.dll'
win:
  executableName: taac-notes
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Bundled Python runtime for the realtime ASR sidecar (Qwen3-ASR via MLX).
  # Built by scripts/prepare-asr-runtime.sh; resolved at runtime via
  # process.resourcesPath (see src/main/audio/realtime/pythonRuntime.ts).
  extraResources:
    - from: python-runtime
      to: python-runtime
  target:
    - dmg
    - zip
  # Hardened Runtime is mandatory for notarization. The entitlements below relax
  # it enough for node-llama-cpp (JIT) and the embedded Python/MLX sidecar
  # (library validation must be disabled to load the unsigned bundled dylibs).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: 'TaacNotes needs microphone access to record meeting audio.'
    - NSAudioCaptureUsageDescription: 'TaacNotes needs audio capture access to record system audio during meetings.'
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # Notarization uses electron-builder's built-in flow; credentials are read from
  # the environment (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID).
  # Stapling of the ticket happens automatically. The nested Python runtime is
  # deep-signed beforehand by scripts/afterPack.mjs.
  notarize: true
afterPack: scripts/afterPack.mjs
# electron-builder notarizes the .app but not the .dmg container; this hook
# submits + staples each produced .dmg so it is Gatekeeper-verifiable offline.
afterAllArtifactBuild: scripts/afterAllArtifactBuild.mjs
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
