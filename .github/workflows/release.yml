name: Release

# Cutting a release = pushing a `v*` tag (see `pnpm release:patch`). This job
# builds, signs, notarizes and publishes the macOS artifacts (.dmg + .zip +
# latest-mac.yml) to the GitHub Release for that tag, which is what
# electron-updater reads from inside the app.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    # Apple Silicon runner: the app ships an arm64-only Python/MLX runtime.
    runs-on: macos-15
    timeout-minutes: 90

    env:
      # Notarization credentials consumed by electron-builder (`mac.notarize: true`)
      # and by scripts/afterAllArtifactBuild.mjs for the DMG.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      # A missing secret otherwise surfaces ~1 minute later as an opaque
      # `SecKeychainItemImport: One or more parameters ... were not valid` (an
      # empty MACOS_CERTIFICATE decodes to a 0-byte .p12). Fail in seconds with
      # the actual cause instead.
      - name: Check signing secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          missing=()
          for name in MACOS_CERTIFICATE MACOS_CERTIFICATE_PWD APPLE_ID \
                      APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            [ -n "${!name}" ] || missing+=("$name")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]} — add them under Settings → Secrets and variables → Actions"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # A tag that disagrees with package.json would publish artifacts whose
      # filenames and latest-mac.yml do not match the release — fail loudly.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # The certificate goes into a dedicated keychain that is ADDED TO THE
      # SEARCH LIST on purpose: scripts/afterPack.mjs resolves the signing
      # identity with `security find-identity`, which ignores the temporary
      # keychain electron-builder would create from CSC_LINK. CSC_LINK is
      # therefore intentionally NOT set — electron-builder auto-discovers the
      # identity from the keychain below.
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/taac-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          # The keychain is thrown away at the end of the job, so its password is
          # generated here rather than kept as one more secret to rotate.
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          if ! printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"; then
            echo "::error::MACOS_CERTIFICATE is not valid base64"
            exit 1
          fi
          if [ ! -s "$CERT_PATH" ]; then
            echo "::error::MACOS_CERTIFICATE decoded to an empty file"
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -f pkcs12 \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$CERT_PATH"
          # Lets codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # A .p12 holding only e.g. an "Apple Development" cert would import
          # cleanly and only blow up much later, during notarization.
          IDENTITIES="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")"
          echo "$IDENTITIES"
          case "$IDENTITIES" in
            *"Developer ID Application:"*) ;;
            *)
              echo "::error::No 'Developer ID Application' identity in the CI keychain — re-export MACOS_CERTIFICATE from a keychain where the certificate and its private key are paired"
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Slowest step by far (CPython download + MLX wheels), and fully
      # determined by the script itself → cache on its hash.
      - name: Cache Python/MLX runtime
        uses: actions/cache@v4
        with:
          path: python-runtime
          key: python-runtime-${{ runner.os }}-${{ hashFiles('scripts/prepare-asr-runtime.sh') }}

      - name: Prepare ASR/LLM Python runtime
        run: pnpm prepare:asr-runtime

      - name: Build (typecheck + electron-vite)
        run: pnpm build

      - name: Package, notarize and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --mac --publish always

      # Catches a silently unsigned/unstapled build before users hit Gatekeeper.
      - name: Verify signature and notarization
        run: |
          APP="$(find dist -maxdepth 2 -name 'Taac.app' -print -quit)"
          if [ -z "$APP" ]; then echo "::error::Packaged app not found under dist/"; exit 1; fi
          spctl -a -vvv -t install "$APP"
          for dmg in dist/*.dmg; do xcrun stapler validate "$dmg"; done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: warn

      - name: Clean up keychain
        if: always()
        run: |
          security list-keychains -d user -s login.keychain-db || true
          security delete-keychain "$RUNNER_TEMP/taac-signing.keychain-db" || true
